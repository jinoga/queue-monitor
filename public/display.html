<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ช่องบริการ - สำนักงานที่ดิน จ.นครสวรรค์</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', 'Segoe UI', sans-serif;
            background: #000000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: #0a0a0a;
            padding: 6px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 2px solid #222222;
        }

        .top-bar h1 {
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .top-bar .info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.85em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #00e676;
            box-shadow: 0 0 8px #00e676;
        }

        .status-dot.offline {
            background: #ff5252;
            box-shadow: 0 0 8px #ff5252;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clock {
            font-size: 1.2em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* ===== GRID ===== */
        .grid-container {
            flex: 1;
            padding: 10px;
            display: grid;
            gap: 12px;
            overflow: hidden;
        }

        /* ===== CARD ===== */
        .card {
            background: #0d0d0d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #333333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .card-header {
            padding: 8px 12px;
            background: #141414;
            border-bottom: 2px solid #222222;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .card-header .counter-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0046ad, #0078ff);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1em;
            color: #ffffff;
        }

        .card-header .counter-label {
            font-weight: 700;
            font-size: 0.95em;
            color: #ffffff;
        }

        /* ===== CURRENT QUEUE (big number) ===== */
        .card-current {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            min-height: 0;
        }

        .card-current .label {
            font-size: 0.85em;
            color: #aaaaaa;
            margin-bottom: 2px;
        }

        .card-current .queue-number {
            font-size: 5.5em;
            font-weight: 800;
            color: #00e5ff;
            line-height: 1;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            font-variant-numeric: tabular-nums;
            transition: all 0.5s ease;
        }

        .card-current .queue-number.flash {
            animation: flashNumber 1s ease;
        }

        @keyframes flashNumber {
            0% {
                color: #fff;
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
                transform: scale(1.1);
            }
            100% {
                color: #00e5ff;
                text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
                transform: scale(1);
            }
        }

        .card-current .time {
            font-size: 0.8em;
            color: #888888;
            margin-top: 4px;
        }

        /* ===== HISTORY ===== */
        .card-history {
            padding: 8px 12px;
            background: #050505;
            border-top: 2px solid #222222;
            flex-shrink: 0;
        }

        .card-history .history-title {
            font-size: 0.75em;
            color: #888888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            font-size: 0.85em;
        }

        .history-row .hq {
            color: #00e5ff;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .history-row .ht {
            color: #888888;
            font-size: 0.95em;
        }

        /* ===== NO DATA ===== */
        .no-data {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex: 1;
            color: #888888;
            font-size: 1.2em;
        }

        /* ===== RESPONSIVE GRID ===== */
        /* 1-2 counters */
        .grid-container.cols-2 {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: 1fr;
        }

        .grid-container.cols-2 .queue-number {
            font-size: 9em;
        }

        /* 3 counters */
        .grid-container.cols-3 {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr;
        }

        .grid-container.cols-3 .queue-number {
            font-size: 7em;
        }

        /* 4 counters */
        .grid-container.cols-4 {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        .grid-container.cols-4 .queue-number {
            font-size: 6em;
        }

        /* 5-6 counters */
        .grid-container.cols-6 {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        .grid-container.cols-6 .queue-number {
            font-size: 5.5em;
        }

        /* 7-8 counters */
        .grid-container.cols-8 {
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        .grid-container.cols-8 .queue-number {
            font-size: 4.5em;
        }

        /* 9+ counters */
        .grid-container.cols-9 {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .grid-container.cols-9 .queue-number {
            font-size: 4em;
        }

        /* 1 counter special */
        .grid-container.cols-1 {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .grid-container.cols-1 .queue-number {
            font-size: 13em;
        }

        /* ===== QUEUE ANNOUNCEMENT OVERLAY ===== */
        .announce-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 10, 30, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .announce-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .announce-overlay.fade-out {
            opacity: 0;
        }

        .announce-label {
            font-size: 2em;
            color: #8eaad6;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .announce-queue {
            font-size: 14em;
            font-weight: 800;
            color: #00e5ff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            animation: blink 0.8s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(0, 229, 255, 0.5), 0 0 120px rgba(0, 229, 255, 0.2);
        }

        .announce-counter {
            font-size: 2.5em;
            color: #ffd740;
            margin-top: 20px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 64, 0.4);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <h1>🏛 สำนักงานที่ดิน จ.นครสวรรค์</h1>
        <div class="info">
            <span><span class="status-dot" id="status-dot"></span><span id="status-text">กำลังเชื่อมต่อ...</span></span>
            <span class="clock" id="clock">--:--:--</span>
        </div>
    </div>

    <!-- ANNOUNCEMENT OVERLAY -->
    <div class="announce-overlay" id="announce-overlay">
        <div class="announce-label">📢 เรียกคิวหมายเลข</div>
        <div class="announce-queue" id="announce-queue">-</div>
        <div class="announce-counter" id="announce-counter">ช่องบริการที่ -</div>
    </div>

    <div class="grid-container" id="grid">
        <div class="no-data" id="no-data">⏳ กำลังโหลดข้อมูล...</div>
    </div>

    <script>
        (function () {
            const SUPA_URL = 'https://ldkelubmmtkrfybapdpc.supabase.co';
            const SUPA_KEY = 'sb_publishable_DRyKBA4GTwq0x-Q4EKY5og_JsCIF5xq';
            const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

            const grid = document.getElementById('grid');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const clockEl = document.getElementById('clock');

            let prevCounterQueues = {}; // เก็บ queue เดิมเพื่อเช็คว่ามีการเปลี่ยนแปลงหรือไม่
            let lastAnnouncedQueue = null; // เก็บคิวล่าสุดที่ประกาศแล้ว
            let announceTimeout = null;

            const overlay = document.getElementById('announce-overlay');
            const announceQueueEl = document.getElementById('announce-queue');
            const announceCounterEl = document.getElementById('announce-counter');

            // แสดง overlay ประกาศคิว 6 วินาที
            function showAnnouncement(queueNo, counterNo) {
                announceQueueEl.textContent = queueNo;
                announceCounterEl.textContent = `ช่องบริการที่ ${counterNo}`;
                overlay.classList.remove('fade-out');
                overlay.classList.add('show');

                if (announceTimeout) clearTimeout(announceTimeout);

                // หลัง 5 วิ fade out, รวม 6 วิหายไป
                announceTimeout = setTimeout(() => {
                    overlay.classList.add('fade-out');
                    setTimeout(() => {
                        overlay.classList.remove('show', 'fade-out');
                    }, 1000);
                }, 5000);
            }

            // นาฬิกา
            function updateClock() {
                clockEl.textContent = new Date().toLocaleTimeString('th-TH', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            }
            setInterval(updateClock, 1000);
            updateClock();

            // เลือก grid layout ตามจำนวนช่อง
            function setGridLayout(count) {
                grid.className = 'grid-container';
                if (count <= 1) grid.classList.add('cols-1');
                else if (count <= 2) grid.classList.add('cols-2');
                else if (count <= 3) grid.classList.add('cols-3');
                else if (count <= 4) grid.classList.add('cols-4');
                else if (count <= 6) grid.classList.add('cols-6');
                else if (count <= 8) grid.classList.add('cols-8');
                else grid.classList.add('cols-9');
            }

            // อัปเดตข้อมูล
            async function update() {
                try {
                    const { data: snaps } = await sb
                        .from('queue_snapshots')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(100);

                    if (!snaps || snaps.length === 0) {
                        grid.innerHTML = '<div class="no-data">📭 ยังไม่มีข้อมูลคิววันนี้</div>';
                        statusDot.className = 'status-dot offline';
                        statusText.textContent = 'ไม่มีข้อมูล';
                        return;
                    }

                    // เช็คสถานะ
                    const latestSnap = snaps[0];
                    const latestTime = new Date(latestSnap.created_at);
                    const diffMin = (new Date() - latestTime) / 1000 / 60;
                    if (diffMin < 3) {
                        statusDot.className = 'status-dot online';
                        statusText.textContent = 'ออนไลน์';
                    } else {
                        statusDot.className = 'status-dot offline';
                        statusText.textContent = 'รอข้อมูล';
                    }

                    // แสดง overlay ถ้าคิวล่าสุดเปลี่ยน
                    const latestKey = `${latestSnap.current_queue}-${latestSnap.current_counter}`;
                    if (lastAnnouncedQueue !== null && lastAnnouncedQueue !== latestKey) {
                        showAnnouncement(latestSnap.current_queue, latestSnap.current_counter);
                    }
                    lastAnnouncedQueue = latestKey;

                    // จัดกลุ่มตามช่องบริการ
                    const counters = {};
                    snaps.forEach(s => {
                        const c = s.current_counter;
                        if (!counters[c]) counters[c] = [];
                        if (counters[c].length < 6) {
                            counters[c].push({
                                q: s.current_queue,
                                time: new Date(s.created_at).toLocaleTimeString('th-TH', {
                                    hour: '2-digit', minute: '2-digit'
                                })
                            });
                        }
                    });

                    const sortedKeys = Object.keys(counters).sort((a, b) => a - b);
                    setGridLayout(sortedKeys.length);

                    grid.innerHTML = '';

                    sortedKeys.forEach(cId => {
                        const data = counters[cId];
                        const current = data[0];
                        const history = data.slice(1);

                        // เช็คว่าคิวเปลี่ยนหรือไม่
                        const changed = prevCounterQueues[cId] !== undefined && prevCounterQueues[cId] !== current.q;
                        prevCounterQueues[cId] = current.q;

                        let historyHTML = '';
                        if (history.length > 0) {
                            historyHTML = `
                            <div class="card-history">
                                <div class="history-title">คิวก่อนหน้า</div>
                                ${history.map(h => `
                                    <div class="history-row">
                                        <span class="hq">${h.q}</span>
                                        <span class="ht">${h.time}</span>
                                    </div>
                                `).join('')}
                            </div>`;
                        }

                        grid.innerHTML += `
                        <div class="card">
                            <div class="card-header">
                                <div class="counter-icon">${cId}</div>
                                <span class="counter-label">ช่องบริการที่ ${cId}</span>
                            </div>
                            <div class="card-current">
                                <div class="label">กำลังให้บริการ</div>
                                <div class="queue-number${changed ? ' flash' : ''}">${current.q}</div>
                                <div class="time">เมื่อ ${current.time}</div>
                            </div>
                            ${historyHTML}
                        </div>`;
                    });

                } catch (e) {
                    console.error('Update error:', e);
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'ผิดพลาด';
                }
            }

            // Realtime subscription
            sb.channel('display')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'latest_status' }, update)
                .subscribe();

            // เริ่มต้น + polling
            update();
            setInterval(update, 20000);
        })();
    </script>
</body>

</html>
